<!DOCTYPE html>
<html>
<head>
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #222; color: #fff; font-family: sans-serif; }
        canvas { border: 2px solid #fff; background: #000; }
        #stats { margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
<canvas id="game" width="600" height="600"></canvas>
<div id="stats"></div>
<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const size = 15;
    const cols = 40, rows = 40;
    let player = { x: 20, y: 20 };
    let grid = Array(cols).fill().map(() => Array(rows).fill(null).map(() => ({ color: '#000', life: 0 })));
    let isGameOver = false;
    let autoPlay = false;
    let minBlackRatio = 1.0;

    function updateStats() {
        let total = cols * rows;
        let blackCount = 0;
        let colors = {};
        grid.forEach(col => col.forEach(cell => {
            if (cell.color === '#000') blackCount++;
            else colors[cell.color] = (colors[cell.color] || 0) + 1;
        }));
        
        let blackRatio = blackCount / total;
        if (blackRatio < minBlackRatio) minBlackRatio = blackRatio;

        let statDiv = document.getElementById('stats');
        statDiv.innerHTML = `黒の占有率: ${(blackRatio*100).toFixed(1)}% | 最小黒率: ${(minBlackRatio*100).toFixed(1)}% | オートプレイ: ${autoPlay ? 'ON' : 'OFF'}`;
    }

    function draw() {
        ctx.clearRect(0, 0, 600, 600);
        for(let x=0; x<cols; x++) {
            for(let y=0; y<rows; y++) {
                ctx.fillStyle = grid[x][y].color;
                ctx.fillRect(x*size, y*size, size-1, size-1);
            }
        }
        const offset = 2;
        ctx.fillStyle = 'red';
        ctx.fillRect(player.x*size + offset, player.y*size + offset, size-1 - offset*2, size-1 - offset*2);

        if (isGameOver) {
            ctx.fillStyle = 'white'; ctx.font = '48px Arial';
            ctx.fillText('CLEAR!', 210, 300);
        }
    }

    function step() {
        if (isGameOver) return;
        
        // オートプレイ時はランダム移動
        if (autoPlay) {
            let moves = [[0,1],[0,-1],[1,0],[-1,0]];
            let [dx, dy] = moves[Math.floor(Math.random()*moves.length)];
            player.x = Math.max(0, Math.min(cols-1, player.x + dx));
            player.y = Math.max(0, Math.min(rows-1, player.y + dy));
        }

        grid[player.x][player.y].color = `hsl(${Math.random() * 360}, 70%, 50%)`;
        grid[player.x][player.y].life = 5;

        // Spread処理
        let newGrid = grid.map(col => col.map(cell => ({ ...cell })));
        for(let x=0; x<cols; x++) {
            for(let y=0; y<rows; y++) {
                if (grid[x][y].life > 0) {
                    const neighbors = [[0,1], [0,-1], [1,0], [-1,0]];
                    const [dx, dy] = neighbors[Math.floor(Math.random() * neighbors.length)];
                    let tx = x + dx, ty = y + dy;
                    if (tx >= 0 && tx < cols && ty >= 0 && ty < rows && newGrid[tx][ty].life === 0) {
                        newGrid[tx][ty].color = grid[x][y].color;
                        newGrid[tx][ty].life = 5;
                    }
                    newGrid[x][y].life--;
                    if (newGrid[x][y].life <= 0) newGrid[x][y].color = '#000';
                }
            }
        }
        grid = newGrid;
        if (Math.random() < 0.05) { 
            let x = Math.floor(Math.random() * cols), y = Math.floor(Math.random() * rows);
            for (let i = 0; i < cols; i++) { grid[i][y].color = '#000'; grid[i][y].life = 0; }
            for (let i = 0; i < rows; i++) { grid[x][i].color = '#000'; grid[x][i].life = 0; }
        }
        if (!grid.some(col => col.some(cell => cell.color === '#000'))) isGameOver = true;
        updateStats();
        draw();
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === ' ') autoPlay = !autoPlay;
        else if (!autoPlay) {
            let dx=0, dy=0;
            if(e.key === 'ArrowUp') dy = -1; else if(e.key === 'ArrowDown') dy = 1;
            else if(e.key === 'ArrowLeft') dx = -1; else if(e.key === 'ArrowRight') dx = 1;
            else return;
            player.x = Math.max(0, Math.min(cols-1, player.x + dx));
            player.y = Math.max(0, Math.min(rows-1, player.y + dy));
            step();
        }
    });
    setInterval(() => { if(autoPlay) step(); }, 100);
    draw(); updateStats();
</script>
</body>
</html>
